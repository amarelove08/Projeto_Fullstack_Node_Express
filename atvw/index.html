<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div id="container">
        <div id="usuario">
            <h1>LISTANDO USUARIOS</h1>
            <ul id="lista-usuario">

            </ul>

        </div>

        <div id="usuario-cadastro">
            <h2>Cadastrar Usuário</h2>
            <input type="text" id="nome-usuario" placeholder="Nome"><br><br>
            <input type="text" id="dataNascimento-usuario" placeholder="Data de Nascimento"><br><br>
            <input type="text" id="cpf-usuario" placeholder="CPF"><br><br>
            <button value="cadastrar" id="cadastrar" onclick="cadastrarUsuario()">Salvar</button>
            <button value="atualizar" id="atualizar" onclick="atualizarUsuario()">Atualizar</button>


            
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
